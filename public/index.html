<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FB 广告数据看板</title>
  <link rel="stylesheet" href="/vendor/tom-select.min.css">
  <link rel="stylesheet" href="/styles.css?v=20260608-1">
  <script src="/vendor/echarts.min.js"></script>
  <script src="/vendor/tom-select.complete.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="模块导航">
      <div class="brand">
        <div class="brand-mark">FB</div>
        <div>
          <strong>广告看板</strong>
          <span>Meta Insights</span>
        </div>
      </div>

      <nav class="nav-list" aria-label="看板视图">
        <button class="nav-item active" type="button" data-view="chart">
          <i data-lucide="area-chart"></i>
          <span>图表看板</span>
        </button>
        <button class="nav-item" type="button" data-view="data">
          <i data-lucide="gauge"></i>
          <span>数据看板</span>
        </button>
        <button class="nav-item" type="button" data-view="list">
          <i data-lucide="list-filter"></i>
          <span>列表看板</span>
        </button>
        <button class="nav-item" type="button" data-view="settings">
          <i data-lucide="settings"></i>
          <span>设置</span>
        </button>
      </nav>

      <div class="side-note">
        <span>数据源</span>
        <strong id="dataSourceName">Demo Insights</strong>
        <small id="dataSourceMeta">待接入采集数据</small>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Facebook Ads Monitor</p>
          <h1 id="pageTitle">FB 广告图表看板</h1>
          <p class="page-subtitle" id="pageSubtitle">按时间查看广告指标走势和窗口变化。</p>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="resetWindowButton" type="button" title="重置时间窗口" aria-label="重置时间窗口">
            <i data-lucide="rotate-ccw"></i>
          </button>
        </div>
      </header>

      <section class="view-toolbar" id="viewToolbar" aria-label="看板选项">
        <div class="toolbar-row">
          <button class="filter-button" id="moreOptionsToggle" type="button" aria-expanded="false" aria-controls="optionsPanel">
            <i data-lucide="sliders-horizontal"></i>
            <span>更多可选项</span>
            <i data-lucide="chevron-down"></i>
          </button>
          <div class="active-chips" id="activeChips" aria-label="当前筛选条件"></div>
        </div>

        <div class="options-popover" id="optionsPanel" hidden>
          <div class="option-grid">
            <div class="control-group">
              <label for="fromDate">开始时间(北京时间)</label>
              <input id="fromDate" type="datetime-local" step="3600">
            </div>
            <div class="control-group">
              <label for="toDate">结束时间(北京时间)</label>
              <input id="toDate" type="datetime-local" step="3600">
            </div>
            <div class="control-group">
              <label for="fromMonth">开始月份</label>
              <input id="fromMonth" type="month">
            </div>
            <div class="control-group">
              <label for="toMonth">结束月份</label>
              <input id="toMonth" type="month">
            </div>
            <div class="control-group">
              <label>计算方式</label>
              <div class="segmented" role="group" aria-label="计算方式">
                <button type="button" class="segment" data-granularity="hour">时</button>
                <button type="button" class="segment active" data-granularity="day">日</button>
                <button type="button" class="segment" data-granularity="week">周</button>
                <button type="button" class="segment" data-granularity="month">月</button>
              </div>
            </div>
            <div class="control-group">
              <label for="campaignFilter">广告系列</label>
              <select id="campaignFilter" multiple></select>
            </div>
            <div class="control-group">
              <label for="deliveryFilter">投放</label>
              <select id="deliveryFilter"></select>
            </div>
            <div class="control-group metric-picker-group">
              <label for="fieldFilter">图表指标 <span id="fieldSummary">已选 0 项</span></label>
              <select id="fieldFilter" multiple></select>
              <div class="field-toolbar compact-field-toolbar">
                <button type="button" data-field-action="core">常用</button>
                <button type="button" data-field-action="allMetrics">全选</button>
                <button type="button" data-field-action="clear">清空</button>
              </div>
            </div>
            <div class="control-group quick-window-group">
              <label>时间窗口</label>
              <div class="quick-window" aria-label="快速时间窗口">
                <button type="button" data-window-preset="yesterday">昨天</button>
                <button type="button" data-window-preset="today">今天</button>
                <button type="button" data-window-preset="last3">近 3 天</button>
                <button type="button" data-window-days="7">近 7 天</button>
                <button type="button" data-window-days="14">近 14 天</button>
                <button type="button" data-window-days="30">近 30 天</button>
                <button type="button" data-window-days="90">近 90 天</button>
                <button type="button" data-window-days="180">近 180 天</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="view-panel active" data-view-panel="chart">
        <section class="panel chart-panel">
          <div class="panel-head">
            <div>
              <h2>时间分布</h2>
              <span id="chartCaption">按日聚合</span>
            </div>
            <label class="switch">
              <input id="normalizeToggle" type="checkbox" checked>
              <span>统一比例</span>
            </label>
          </div>
          <div class="chart-wrap">
            <div id="mainChart" class="chart"></div>
            <div class="empty-state" id="chartEmpty" hidden>请选择至少一个数值指标</div>
          </div>
        </section>
      </section>

      <section class="view-panel" data-view-panel="data" hidden>
        <section class="kpi-grid" id="kpiGrid" aria-label="关键指标"></section>
        <section class="panel metric-panel">
          <div class="panel-head">
            <div>
              <h2>指标总览</h2>
              <span id="metricCaption">当前时间窗口</span>
            </div>
          </div>
          <div class="metric-grid" id="metricGrid"></div>
        </section>
      </section>

      <section class="view-panel" data-view-panel="list" hidden>
        <section class="panel table-panel">
        <div class="panel-head">
          <div>
            <h2>广告系列汇总</h2>
            <span id="tableCaption">当前时间窗口</span>
          </div>
          <div class="table-count" id="tableCount">0 行</div>
        </div>
          <div class="table-scroll">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="view-panel" data-view-panel="settings" hidden>
        <section class="panel settings-panel">
          <div class="panel-head">
            <div>
              <h2>监控设置</h2>
              <span id="settingsCaption">List 1 广告系列 · List 2 广告</span>
            </div>
            <div class="settings-actions">
              <button class="icon-button" id="reloadSettingsButton" type="button" title="刷新账户设置" aria-label="刷新账户设置">
                <i data-lucide="refresh-cw"></i>
              </button>
              <button class="primary-button" id="saveSettingsButton" type="button">
                <i data-lucide="save"></i>
                <span>保存</span>
              </button>
            </div>
          </div>
          <div class="settings-body">
            <div class="monitor-status-strip" id="monitorStatusGrid"></div>

            <div class="monitor-grid">
              <section class="monitor-card">
                <div class="monitor-card-head">
                  <div>
                    <span class="monitor-kicker">List 1</span>
                    <h3>广告系列监控</h3>
                  </div>
                  <label class="switch settings-switch">
                    <input id="campaignMonitorEnabled" type="checkbox">
                    <span>启用</span>
                  </label>
                </div>
                <div class="settings-grid two-col">
                  <div class="control-group">
                    <label for="campaignIntervalInput">频率(分钟)</label>
                    <input id="campaignIntervalInput" type="number" min="60" max="360" step="1">
                  </div>
                  <div class="control-group">
                    <label for="campaignResultActionInput">成效口径</label>
                    <input id="campaignResultActionInput" type="text" placeholder="omni_purchase">
                  </div>
                  <label class="switch settings-switch wide-switch">
                    <input id="campaignAutoActiveInput" type="checkbox">
                    <span>账户解析 ACTIVE campaigns</span>
                  </label>
                  <div class="control-group settings-field wide">
                    <label for="monitorAccountsInput">监控账户 ID</label>
                    <textarea id="monitorAccountsInput" rows="5" spellcheck="false" placeholder="8462513793771963"></textarea>
                  </div>
                  <div class="control-group settings-field wide">
                    <label for="campaignIdsInput">手动 campaign ID</label>
                    <textarea id="campaignIdsInput" rows="6" spellcheck="false" placeholder="120238379067340623"></textarea>
                  </div>
                </div>
                <div class="settings-summary" id="campaignMonitorSummary"></div>
                <div class="resolved-list" id="campaignResolvedList"></div>
              </section>

              <section class="monitor-card">
                <div class="monitor-card-head">
                  <div>
                    <span class="monitor-kicker">List 2</span>
                    <h3>广告数据监控</h3>
                  </div>
                  <label class="switch settings-switch">
                    <input id="adMonitorEnabled" type="checkbox">
                    <span>启用</span>
                  </label>
                </div>
                <div class="settings-grid two-col">
                  <div class="control-group">
                    <label for="adIntervalInput">频率(分钟)</label>
                    <input id="adIntervalInput" type="number" min="30" max="180" step="1">
                  </div>
                  <div class="control-group">
                    <label for="adResultActionInput">成效口径</label>
                    <input id="adResultActionInput" type="text" placeholder="omni_purchase">
                  </div>
                  <div class="control-group">
                    <label for="adConcurrencyInput">并发</label>
                    <input id="adConcurrencyInput" type="number" min="1" max="20" step="1">
                  </div>
                  <div class="control-group">
                    <label for="adQpsInput">QPS</label>
                    <input id="adQpsInput" type="number" min="1" max="20" step="1">
                  </div>
                  <div class="control-group">
                    <label for="adTimeoutInput">超时(ms)</label>
                    <input id="adTimeoutInput" type="number" min="1000" max="60000" step="500">
                  </div>
                  <div class="control-group">
                    <label for="adMaxAttemptsInput">最大尝试</label>
                    <input id="adMaxAttemptsInput" type="number" min="1" max="20" step="1">
                  </div>
                  <div class="control-group settings-field wide">
                    <label for="adIdsInput">ad ID</label>
                    <textarea id="adIdsInput" rows="10" spellcheck="false" placeholder="120238379067340623"></textarea>
                  </div>
                </div>
                <div class="settings-summary" id="adMonitorSummary"></div>
              </section>
            </div>

            <section class="recent-runs">
              <div class="recent-runs-head">
                <h3>最近批次</h3>
                <span id="settingsStatus" role="status"></span>
              </div>
              <div class="table-scroll compact-table">
                <table>
                  <thead>
                    <tr>
                      <th>列表</th>
                      <th>状态</th>
                      <th>上次运行</th>
                      <th>下次运行</th>
                      <th>成功/失败</th>
                      <th>重试</th>
                      <th>耗时</th>
                      <th>错误</th>
                    </tr>
                  </thead>
                  <tbody id="recentRunsBody"></tbody>
                </table>
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="/app.js?v=20260608-1"></script>
</body>
</html>
